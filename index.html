<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Odin Project Calculator</h1>
    <div id="calcBody">
        <div class="calcScreen">0</div>
        <div class="navBar">
            <button class="button" data-action="clear">C</button>
            <button class="button" data-action="delete">Del</button>
        </div>
        <div class="numBody">
            <div class="numPad">
                <div class="row1">
                    <button class="button">7</button>
                    <button class="button">8</button>
                    <button class="button">9</button>
                </div>
                <div class="row2">
                    <button class="button">4</button>
                    <button class="button">5</button>
                    <button class="button">6</button>
                </div>
                <div class="row3">
                    <button class="button">1</button>
                    <button class="button">2</button>
                    <button class="button">3</button>
                </div>
                <div class="row4">
                    <button class="button">0</button>
                </div>
            </div>
            <div class="operators">
                <button class="button" data-operator="/">/</button>
                <button class="button" data-operator="*">*</button>
                <button class="button" data-operator="-">-</button>
                <button class="button" data-operator="+">+</button>
                <button class="button" id="equals">=</button>
            </div>
        </div>
    </div>
</body>
</html>
